<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knee Rehab Flow</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <p class="eyebrow">Telegram Mini App</p>
        <h1>Колено · Rehab Flow</h1>
        <p id="planHint" class="hint"></p>
      </header>

      <section id="dashboard" class="card">
        <div class="stats-grid">
          <article>
            <p class="stat-label">Завершено сессий</p>
            <p id="sessionsCount" class="stat-value">0</p>
          </article>
          <article>
            <p class="stat-label">Текущий стрик</p>
            <p id="streakCount" class="stat-value">0</p>
          </article>
          <article>
            <p class="stat-label">Следующая сессия</p>
            <p id="nextDate" class="stat-value small">Сегодня</p>
          </article>
        </div>
        <button id="startSessionBtn" class="btn btn-primary">Начать тренировку</button>
      </section>

      <section id="player" class="card hidden">
        <div class="player-top">
          <p id="exerciseIndex" class="eyebrow"></p>
          <div class="progress"><span id="progressFill"></span></div>
        </div>

        <h2 id="exerciseTitle"></h2>
        <p id="exerciseMeta" class="hint"></p>

        <div class="video-wrap">
          <iframe
            id="exerciseVideo"
            title="Exercise demo"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
          ></iframe>
        </div>

        <div class="timer-panel">
          <p id="timerValue">00:45</p>
          <div class="timer-actions">
            <button id="timerStartBtn" class="btn">Старт</button>
            <button id="timerPauseBtn" class="btn">Пауза</button>
            <button id="timerResetBtn" class="btn">Сброс</button>
          </div>
        </div>

        <div class="reps-panel hidden" id="repsPanel">
          <p>Повторы: <span id="repsDone">0</span> / <span id="repsTarget">0</span></p>
          <button id="repAddBtn" class="btn btn-accent">+1 повтор</button>
        </div>

        <div class="player-actions">
          <button id="prevBtn" class="btn">Назад</button>
          <button id="doneBtn" class="btn btn-primary">Готово</button>
          <button id="skipBtn" class="btn">Пропустить</button>
        </div>
      </section>

      <section id="history" class="card">
        <h3>История</h3>
        <ul id="historyList" class="history-list"></ul>
      </section>

      <section class="card disclaimer">
        <h3>Важно</h3>
        <p>
          Это трекер упражнений, а не медицинская диагностика. При боли, отеке,
          блокировке колена или ухудшении состояния — остановись и обратись к врачу.
        </p>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
